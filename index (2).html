    body { background: var(--black); font-family: 'Barlow', sans-serif; color: var(--text); }

    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }

    @keyframes bounceDot {

    @keyframes scanLine {
      from { transform: translateY(-100%); }
      to   { transform: translateY(100vh); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

      from { opacity: 0; transform: rotate(-6deg) scale(0.94); }
      to   { opacity: 1; transform: rotate(0) scale(1); }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-30px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes numberCount {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }

    .anim-up   { animation: fadeUp 0.75s cubic-bezier(.22,1,.36,1) forwards; opacity: 0; }

      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      transition: color 0.2s;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;

      background: var(--lime);
      transition: width 0.25s cubic-bezier(.22,1,.36,1);

    .nav-link:hover { color: var(--lime); }

      font-size: 16px;

    /* ── Glow dot ── */

      background: var(--lime);
      border-radius: 50%;

    /* ── Mobile ── */

      background: repeating-linear-gradient(

      height: 2px;

/* ─────────────────── Intersection Observer Hook ─────────────────── */
function useVisible(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

              دائمًا مفتوحون من أجلك
            </span>
          </h2>
          <p className="section-sub">7 jours sur 7, nous sommes là pour vous accompagner dans votre transformation.
            <span className="ar-text" style={{ fontSize: "0.9em", marginTop: 6, color: "#555" }}>
              7 أيام في الأسبوع، نحن هنا لمرافقتك في مسيرة تحولك.
            </span>
          </p>
        </div>

        <div style={{ background: "var(--card)", borderRadius: 16,
                      border: "1px solid rgba(255,255,255,0.07)", overflow: "hidden",
                      opacity: visible ? 1 : 0, transform: visible ? "none" : "translateY(24px)",
                      transition: "all 0.7s 0.15s cubic-bezier(.22,1,.36,1)" }}>
          {SCHEDULE.map((d, i) => {
            const isToday = todayCapitalized.startsWith(d.day.slice(0,4));
            return (
              <div key={i} className="day-row"
                style={{ background: isToday ? "rgba(204,255,0,0.06)" : "transparent" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                  <span className="dot" />
                  <span className="font-cond"
                    style={{ fontSize: 17, fontWeight: isToday ? 800 : 600,
                             color: isToday ? "var(--lime)" : "#ddd",
                             letterSpacing: "0.03em" }}>
                    {d.day}
                  </span>
                  {isToday && (
                    <span style={{ background: "var(--lime)", color: "#080808",
                                   fontSize: 10, fontWeight: 800, padding: "2px 8px",
                                   borderRadius: 100, fontFamily: "'Barlow Condensed', sans-serif",
                                   letterSpacing: 1 }}>
                      AUJOURD'HUI
                    </span>
                  )}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <Icon name="clock" size={14} color="var(--lime)" />
                  <span className="font-cond"
                    style={{ color: "var(--lime)", fontWeight: 700, fontSize: 16, letterSpacing: "0.04em" }}>
                    {d.hours}
                  </span>
                </div>
              </div>
            );
          })}
        </div>
        <p className="font-body"
          style={{ color: "#444", fontSize: 12, textAlign: "center", marginTop: 14 }}>
          * Horaires susceptibles d'être modifiés lors des jours fériés marocains.
        </p>
      </div>
    </section>
  );
